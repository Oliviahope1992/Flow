<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BarreFlow — Class Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2ECEE; --surface:#FBF8F8; --surface-2:#F7F0F2;
  --ink:#2C2230; --ink-soft:#6B5E6E; --line:#E4D8DD;
  --accent:#7A3E54; --accent-soft:#F4E6EB;
  --barre:#A6485F; --barre-bg:#F7E7EC;
  --buti:#C0772C; --buti-bg:#F7EBD9;
  --stretch:#5C7A60; --stretch-bg:#E6EEE7;
  --active:#2F6E80; --active-bg:#DFEBEF;
  --compression:#6E4C8A; --compression-bg:#ECE4F3;
  --wrist:#8A6A3A; --wrist-bg:#F1EADB;
  --assess:#9A4574; --assess-bg:#F4E5EE;
  --radius:14px; --shadow:0 1px 2px rgba(44,34,48,.05),0 8px 28px rgba(44,34,48,.06);
  --serif:"Fraunces",Georgia,"Times New Roman",serif;
  --sans:"Hanken Grotesk",system-ui,-apple-system,Segoe UI,sans-serif;
  --mono:"Space Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

.topbar{position:sticky;top:0;z-index:50;background:rgba(242,236,238,.86);backdrop-filter:saturate(1.2) blur(10px);border-bottom:1px solid var(--line)}
.topbar-in{max-width:1080px;margin:0 auto;padding:14px 22px;display:flex;align-items:baseline;gap:24px;flex-wrap:wrap}
.brand{font-family:var(--serif);font-weight:600;font-size:23px;letter-spacing:-.01em;line-height:1}
.brand .dot{color:var(--barre)}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.nav button{font-size:13.5px;font-weight:600;letter-spacing:.01em;padding:7px 13px;border-radius:999px;color:var(--ink-soft);transition:background .15s,color .15s}
.nav button:hover{color:var(--ink);background:var(--surface-2)}
.nav button.on{color:#fff;background:var(--accent)}

main{max-width:1080px;margin:0 auto;padding:0 22px 80px}

.masthead{padding:46px 0 30px;border-bottom:1px solid var(--line)}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin:0 0 16px}
.series-tabs{display:inline-flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:4px;margin:0 0 22px}
.seriestab{font-size:14px;font-weight:700;padding:8px 18px;border-radius:999px;color:var(--ink-soft);transition:background .15s,color .15s}
.seriestab:hover{color:var(--ink)}
.seriestab.on{background:var(--accent);color:#fff}
.masthead h1{font-family:var(--serif);font-weight:500;font-size:clamp(36px,5.6vw,64px);line-height:1.03;letter-spacing:-.02em;margin:0 0 18px}
.masthead h1 em{font-style:italic;color:var(--barre)}
.lede{font-size:17px;max-width:56ch;color:var(--ink-soft);margin:0}
.legend{display:flex;flex-wrap:wrap;gap:14px 20px;margin-top:28px}
.legend span{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

.season{margin-top:14px}
.weekcard{display:grid;grid-template-columns:74px 1fr auto;gap:22px;align-items:center;width:100%;text-align:left;padding:24px 4px;border-bottom:1px solid var(--line);transition:transform .18s ease,background .18s ease;border-radius:10px}
.weekcard:hover{transform:translateX(4px);background:linear-gradient(90deg,var(--surface-2),transparent)}
.wk-num{font-family:var(--mono);font-size:13px;color:var(--ink-soft);line-height:1.2}
.wk-num b{display:block;font-family:var(--serif);font-weight:500;font-size:40px;color:var(--ink);letter-spacing:-.02em}
.wk-body h3{font-family:var(--serif);font-weight:500;font-size:25px;letter-spacing:-.01em;margin:0 0 5px}
.wk-body p{margin:0 0 12px;color:var(--ink-soft);font-size:14.5px;max-width:60ch}
.mixbar{display:flex;height:7px;border-radius:4px;overflow:hidden;max-width:340px;background:var(--line)}
.mixbar i{height:100%}
.wk-overview{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);letter-spacing:.04em}
.wk-meta{text-align:right;display:flex;flex-direction:column;gap:9px;align-items:flex-end;min-width:120px}
.chip{font-size:11.5px;font-weight:700;letter-spacing:.02em;padding:4px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);white-space:nowrap}
.chip.soft{background:var(--surface-2);color:var(--ink-soft)}
.wk-meta .time{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
.wk-meta .arrow{font-size:20px;color:var(--barre);transition:transform .18s}
.weekcard:hover .arrow{transform:translateX(3px)}

.backbtn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;color:var(--ink-soft);margin:30px 0 6px;padding:6px 0}
.backbtn:hover{color:var(--accent)}
.detail-head{padding:6px 0 26px;border-bottom:1px solid var(--line)}
.detail-head .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 10px}
.detail-head h2{font-family:var(--serif);font-weight:500;font-size:clamp(30px,5vw,46px);letter-spacing:-.02em;margin:0 0 12px}
.detail-head .meta{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;margin-bottom:16px}
.detail-head .meta .time,.detail-head .meta .count{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
.detail-head .intent{font-size:16.5px;color:var(--ink-soft);max-width:64ch;margin:0 0 16px}
.targetrow{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}
.notebox{margin-top:16px;font-size:13.5px;color:var(--ink-soft);background:var(--surface);border:1px dashed var(--line);border-radius:10px;padding:11px 14px}
.class-empty{margin-top:30px;padding:34px 26px;text-align:center;border:1px dashed var(--line);border-radius:14px;background:var(--surface);color:var(--ink-soft);font-size:15px;max-width:60ch}
.class-empty b{display:block;font-family:var(--serif);font-weight:500;font-size:20px;color:var(--ink);margin-bottom:8px}

.section{margin:34px 0;display:grid;grid-template-columns:128px 1fr;gap:26px}
.sec-rail{position:relative}
.sec-rail .sec-time{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink)}
.sec-rail .sec-tgt{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.35}
.sec-rail .music{margin-top:14px;font-size:12.5px;color:var(--ink-soft);line-height:1.45;border-top:1px solid var(--line);padding-top:12px}
.sec-rail .music .song{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--ink);display:block}
.sec-rail .music .mood{display:block;margin-top:2px;font-size:11.5px}
.sec-rail .music .note{display:inline-block;color:var(--barre);margin-right:5px}
.sec-body h4{font-family:var(--serif);font-weight:500;font-size:21px;letter-spacing:-.01em;margin:0 0 14px;display:flex;align-items:center;gap:10px}
.newpill{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--accent);padding:3px 7px;border-radius:999px}

.move{display:grid;grid-template-columns:1fr auto;gap:8px 16px;padding:13px 15px 13px 16px;border-radius:11px;background:var(--surface);box-shadow:var(--shadow);margin-bottom:9px;border-left:4px solid var(--line);position:relative}
.move .mhead{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.move .mname{font-weight:600;font-size:15.5px}
.move .mtag{font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:2px 7px;border-radius:999px}
.move .mcount{font-family:var(--mono);font-size:12.5px;color:var(--ink);white-space:nowrap;align-self:start;padding-top:2px}
.move .mcue{grid-column:1 / -1;font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin-top:2px}
.move .mnew{position:absolute;top:-7px;right:12px}

.m-barre{border-left-color:var(--barre)} .t-barre{background:var(--barre-bg);color:var(--barre)}
.m-buti{border-left-color:var(--buti)} .t-buti{background:var(--buti-bg);color:var(--buti)}
.m-stretch{border-left-color:var(--stretch)} .t-stretch{background:var(--stretch-bg);color:var(--stretch)}
.m-active{border-left-color:var(--active)} .t-active{background:var(--active-bg);color:var(--active)}
.m-compression{border-left-color:var(--compression)} .t-compression{background:var(--compression-bg);color:var(--compression)}
.m-wrist{border-left-color:var(--wrist)} .t-wrist{background:var(--wrist-bg);color:var(--wrist)}
.m-assess{border-left-color:var(--assess);background:var(--assess-bg)} .t-assess{background:#fff;color:var(--assess)}

.page-head{padding:46px 0 22px;border-bottom:1px solid var(--line)}
.page-head h2{font-family:var(--serif);font-weight:500;font-size:clamp(28px,4.5vw,42px);letter-spacing:-.02em;margin:0 0 10px}
.page-head p{margin:0;color:var(--ink-soft);max-width:64ch;font-size:15.5px}

.bench{width:100%;border-collapse:collapse;margin-top:26px}
.bench th,.bench td{text-align:left;padding:13px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.bench th{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
.bench td.metric{font-weight:600;font-size:14.5px;max-width:240px}
.bench td.metric small{display:block;font-weight:400;color:var(--ink-soft);font-size:12.5px;margin-top:2px}
.bench input{width:92px;font-family:var(--mono);font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink)}
.bench input:focus{border-color:var(--accent);outline:none}
.delta{font-family:var(--mono);font-size:13.5px;font-weight:700}
.delta.up{color:var(--stretch)} .delta.down{color:var(--barre)} .delta.flat{color:var(--ink-soft)}
.save-row{margin-top:22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.btn{font-weight:700;font-size:14px;padding:11px 20px;border-radius:999px;background:var(--accent);color:#fff;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn-ghost{font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.savedmsg{font-size:13.5px;color:var(--stretch);font-weight:600}
.storenote{font-size:12.5px;color:var(--ink-soft);margin-top:18px;max-width:62ch;line-height:1.5}

.lib-controls{position:sticky;top:57px;z-index:30;background:var(--bg);padding:18px 0 12px;margin-top:6px}
.libsearch{width:100%;max-width:420px;font-size:15px;padding:11px 15px;border:1px solid var(--line);border-radius:999px;background:var(--surface);color:var(--ink)}
.libsearch:focus{border-color:var(--accent);outline:none}
.chiprow{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.chiprow .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;align-self:center;margin-right:2px}
.fchip{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft)}
.fchip:hover{color:var(--ink)}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.fchip.on[data-mod="barre"]{background:var(--barre);border-color:var(--barre)}
.fchip.on[data-mod="buti"]{background:var(--buti);border-color:var(--buti)}
.fchip.on[data-mod="stretch"]{background:var(--stretch);border-color:var(--stretch)}
.fchip.on[data-mod="active"]{background:var(--active);border-color:var(--active)}
.fchip.on[data-mod="compression"]{background:var(--compression);border-color:var(--compression)}
.fchip.on[data-mod="wrist"]{background:var(--wrist);border-color:var(--wrist)}
.libcount{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);margin:6px 0 14px}
.libcard{display:grid;grid-template-columns:1fr auto;gap:6px 14px;padding:13px 15px;border-radius:11px;background:var(--surface);box-shadow:var(--shadow);margin-bottom:9px;border-left:4px solid var(--line);align-items:center}
.libcard .lhead{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.libcard .lname{font-weight:600;font-size:15.5px}
.libcard .lmeta{grid-column:1/-1;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.libcard .lcue{grid-column:1/-1;font-size:13px;color:var(--ink-soft);line-height:1.45}
.addbtn{font-size:13px;font-weight:700;padding:8px 14px;border-radius:999px;background:var(--accent-soft);color:var(--accent);white-space:nowrap}
.addbtn:hover{background:var(--accent);color:#fff}

.addbar{position:sticky;top:57px;z-index:31;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--ink);color:#fff;border-radius:12px;padding:11px 16px;margin:14px 0}
.addbar .ab-name{font-weight:700;font-size:14.5px}
.addbar .ab-meta{font-family:var(--mono);font-size:12px;opacity:.8}
.addbar .ab-actions{margin-left:auto;display:flex;gap:8px}
.addbar button{font-size:13px;font-weight:700;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.16);color:#fff}
.addbar button:hover{background:rgba(255,255,255,.28)}

.newroutine{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:24px 0 8px}
.newroutine select{font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink)}
.rtcard{display:grid;grid-template-columns:1fr auto;gap:10px 18px;align-items:center;width:100%;text-align:left;padding:20px 18px;border:1px solid var(--line);border-radius:13px;background:var(--surface);box-shadow:var(--shadow);margin-bottom:12px}
.rtcard h3{font-family:var(--serif);font-weight:500;font-size:21px;margin:0 0 4px;letter-spacing:-.01em}
.rtcard .rt-sub{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.rtcard .mixbar{margin-top:10px;max-width:300px}
.rtcard .rt-go{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.empty{padding:36px 0;color:var(--ink-soft);font-size:15px}

.editor-head{padding:6px 0 22px;border-bottom:1px solid var(--line)}
.rtname{font-family:var(--serif);font-weight:500;font-size:clamp(26px,4vw,38px);letter-spacing:-.02em;border:none;background:transparent;color:var(--ink);width:100%;padding:4px 0;border-bottom:2px dashed transparent}
.rtname:hover{border-bottom-color:var(--line)}
.rtname:focus{outline:none;border-bottom-color:var(--accent)}
.editor-meta{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;margin:12px 0 16px}
.editor-meta .time,.editor-meta .count{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
.editor-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.autosave{font-size:12.5px;color:var(--stretch);font-weight:600;align-self:center}
.eitem{display:grid;grid-template-columns:1fr auto;gap:6px 14px;padding:12px 14px;border-radius:11px;background:var(--surface);box-shadow:var(--shadow);margin-bottom:9px;border-left:4px solid var(--line)}
.eitem .ehead{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.eitem .ename{font-weight:600;font-size:15px}
.eitem .ecue{grid-column:1/-1;font-size:12.5px;color:var(--ink-soft);line-height:1.45;margin:0}
.ectrls{display:flex;align-items:center;gap:6px}
.ecount{width:140px;font-family:var(--mono);font-size:12.5px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
.ecount:focus{border-color:var(--accent);outline:none}
.iconbtn{width:30px;height:30px;border-radius:8px;background:var(--surface-2);color:var(--ink-soft);font-size:14px;display:inline-flex;align-items:center;justify-content:center}
.iconbtn:hover{background:var(--accent-soft);color:var(--accent)}
.iconbtn.danger:hover{background:var(--barre-bg);color:var(--barre)}
.addmoves{margin:18px 0;display:flex;gap:10px;flex-wrap:wrap}

.stub{padding:70px 0;text-align:center}
.stub .icon{font-family:var(--serif);font-size:46px;color:var(--barre);margin-bottom:10px}
.stub h2{font-family:var(--serif);font-weight:500;font-size:30px;margin:0 0 12px;letter-spacing:-.01em}
.stub p{max-width:46ch;margin:0 auto;color:var(--ink-soft);font-size:15.5px}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:14px;font-weight:600;padding:12px 20px;border-radius:999px;box-shadow:0 10px 30px rgba(44,34,48,.25);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.foot{max-width:1080px;margin:0 auto;padding:30px 22px 50px;border-top:1px solid var(--line);color:var(--ink-soft);font-size:12.5px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
.foot .mono{font-family:var(--mono)}

@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.rise{animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

@media(max-width:720px){
  main,.topbar-in,.foot{padding-left:16px;padding-right:16px}
  .weekcard{grid-template-columns:54px 1fr;gap:14px}
  .wk-meta{grid-column:2;flex-direction:row;align-items:center;justify-content:flex-start;flex-wrap:wrap;margin-top:4px}
  .wk-meta .arrow{display:none}
  .wk-num b{font-size:30px}
  .section{grid-template-columns:1fr;gap:12px}
  .sec-rail{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:10px}
  .sec-rail .music{border-top:none;padding-top:0;margin-top:0;flex-basis:100%}
  .bench input{width:74px}
  .lib-controls,.addbar{top:53px}
  .ecount{width:104px}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-in">
    <div class="brand">Barre<span class="dot">·</span>Flow</div>
    <nav class="nav" id="nav"></nav>
  </div>
</header>
<main id="app"></main>
<footer class="foot">
  <span>BarreFlow — movement planning studio</span>
  <span class="mono" id="footnote"></span>
</footer>
<div class="toast" id="toast"></div>

<script id="curriculum" type="application/json">{
 "meta": {
  "title": "BarreFlow",
  "subtitle": "8-Week Yoga · Barre · Buti Flexibility Series"
 },
 "modalities": {
  "barre": {
   "label": "Barre",
   "glyph": "ballet"
  },
  "buti": {
   "label": "Buti / Hot Buddhi",
   "glyph": "fire"
  },
  "stretch": {
   "label": "Stretch",
   "glyph": "yin"
  },
  "active": {
   "label": "Active Flexibility",
   "glyph": "active"
  },
  "compression": {
   "label": "Compression",
   "glyph": "compression"
  },
  "wrist": {
   "label": "Wrist & Grip",
   "glyph": "wrist"
  },
  "assess": {
   "label": "Assessment",
   "glyph": "assess"
  }
 },
 "series": [
  {
   "id": "barreflow",
   "name": "BarreFlow",
   "hero": "A season of <em>movement</em>,<br>planned section by section.",
   "tagline": "Eight weeks of Yoga · Barre · Buti, building from foundation to full expression. Tap any week for the run sheet — or pull moves from the Library to shape your own routines.",
   "classes": [
    {
     "week": 1,
     "theme": "Foundation",
     "difficulty": "Beginner",
     "intent": "Building the base — alignment, breath, and the core barre and yoga shapes.",
     "themeNote": "Class name added — your source didn't title weeks 1–2.",
     "sections": [
      {
       "name": "Baseline Assessment",
       "target": "Measure & Record",
       "new": true,
       "music": null,
       "moves": [
        {
         "m": "assess",

<script>
"use strict";
const DATA = JSON.parse(document.getElementById("curriculum").textContent);
const SERIES = DATA.series;

const store = (function(){
  let mem = {};
  return {
    get(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in mem)? mem[k] : null; } },
    set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
  };
})();

const MOD = DATA.modalities;
const MIX_KEYS = ["barre","buti","stretch","active","compression","wrist"];
const MODORDER = {barre:0,buti:1,stretch:2,active:3,compression:4,wrist:5,assess:6};

function fmtTime(sec){ const m=Math.round(sec/60); return m<1 ? sec+"s" : m+" min"; }
function movesSec(ms){ return ms.reduce((a,m)=>a+(m.s||0),0); }
function sectionSec(s){ return movesSec(s.moves); }
function classSec(c){ return c.sections.reduce((a,s)=>a+sectionSec(s),0); }
function classMoves(c){ return c.sections.reduce((a,s)=>a+s.moves.length,0); }
function hasMoves(c){ return c.sections && c.sections.length>0; }
function allMoves(c){ const o=[]; c.sections.forEach(s=>s.moves.forEach(m=>{ if(m.m!=="assess") o.push({m:m.m,n:m.n,c:m.c,q:m.q,s:m.s}); })); return o; }
function mixFromMoves(ms){
  const t={}; MIX_KEYS.forEach(k=>t[k]=0);
  ms.forEach(m=>{ if(t[m.m]!=null) t[m.m]+=m.s; });
  const total=MIX_KEYS.reduce((a,k)=>a+t[k],0)||1;
  return MIX_KEYS.map(k=>({k,pct:t[k]/total*100})).filter(o=>o.pct>0);
}
function mixBar(ms){ return mixFromMoves(ms).map(o=>`<i style="flex:${o.pct};background:var(--${o.k})"></i>`).join(""); }
function tagOf(m){ return MOD[m] ? MOD[m].label : m; }

/* ---- move library derived across every series ---- */
const LIBRARY = (function(){
  const map = new Map();
  SERIES.forEach(se=>se.classes.forEach(c=>(c.sections||[]).forEach(s=>s.moves.forEach(m=>{
    if(m.m==="assess") return;
    let e = map.get(m.n);
    if(!e){ e={m:m.m,n:m.n,c:m.c,q:m.q,s:m.s,new:!!m.new,targets:new Set(),weeks:new Set()}; map.set(m.n,e); }
    e.targets.add(s.target); e.weeks.add(c.week);
  }))));
  const arr=[...map.values()].map(e=>({...e,targets:[...e.targets],weeks:[...e.weeks].sort((a,b)=>a-b)}));
  arr.sort((a,b)=> (MODORDER[a.m]-MODORDER[b.m]) || a.n.localeCompare(b.n));
  return arr;
})();
const AREAS = (function(){ const s=new Set(); LIBRARY.forEach(e=>e.targets.forEach(t=>s.add(t))); return [...s].sort(); })();

/* ---- routines ---- */
function loadRoutines(){ try{ return JSON.parse(store.get("bf_routines")||"[]"); }catch(e){ return []; } }
function saveRoutines(a){ store.set("bf_routines", JSON.stringify(a)); }
let ROUTINES = loadRoutines();
let activeId = store.get("bf_active") || null;
function persist(){ saveRoutines(ROUTINES); }
function getActive(){ return ROUTINES.find(r=>r.id===activeId) || null; }
function setActive(id){ activeId=id; store.set("bf_active", id||""); }
function uniqueName(base){ let n=base,i=2; const names=ROUTINES.map(r=>r.name); while(names.includes(n)){ n=base+" "+i; i++; } return n; }
function classByBase(b){ if(!b||b==="empty") return null; let si,wk; if(b.indexOf(":")>=0){ [si,wk]=b.split(":").map(Number); } else { si=0; wk=+b; } const s=SERIES[si]; return s? {series:s, c:s.classes.find(x=>x.week===wk)} : null; }
function baseLabel(b){ const r=classByBase(b); return r&&r.c ? "based on "+r.series.name+" · Week "+r.c.week : "from scratch"; }
function createRoutine(base){
  let name, items;
  const r0=classByBase(base);
  if(r0&&r0.c){ name=uniqueName(r0.c.theme); items=allMoves(r0.c); }
  else { name=uniqueName("New routine"); items=[]; base="empty"; }
  const r={id:"r"+Date.now().toString(36), name, base, items};
  ROUTINES.push(r); persist(); setActive(r.id); return r;
}
function addLib(idx){
  const mv=LIBRARY[idx]; if(!mv) return;
  let r=getActive(); let made=false;
  if(!r){ r=createRoutine("empty"); made=true; }
  r.items.push({m:mv.m,n:mv.n,c:mv.c,q:mv.q,s:mv.s}); persist();
  toast(made ? "Started \u201c"+r.name+"\u201d with "+mv.n : "Added "+mv.n);
  const bar=document.getElementById("addbarmeta"); if(bar) bar.textContent=r.items.length+" moves \u00b7 "+fmtTime(movesSec(r.items));
  if(made) renderView();
}
function removeItem(i){ const r=getActive(); if(!r) return; r.items.splice(i,1); persist(); renderView(); }
function moveItem(i,d){ const r=getActive(); if(!r) return; const j=i+d; if(j<0||j>=r.items.length) return; const t=r.items[i]; r.items[i]=r.items[j]; r.items[j]=t; persist(); renderView(); }
function setCount(i,v){ const r=getActive(); if(!r) return; r.items[i].c=v; persist(); }
function renameActive(v){ const r=getActive(); if(!r) return; r.name=v.trim()||r.name; persist(); }
function duplicateActive(){ const r=getActive(); if(!r) return; const copy={id:"r"+Date.now().toString(36),name:uniqueName(r.name+" (copy)"),base:r.base,items:r.items.map(x=>({...x}))}; ROUTINES.push(copy); persist(); setActive(copy.id); go("editor"); toast("Duplicated"); }
function deleteActive(){ const r=getActive(); if(!r) return; if(!confirm("Delete \u201c"+r.name+"\u201d? This can\u2019t be undone.")) return; ROUTINES=ROUTINES.filter(x=>x.id!==r.id); persist(); setActive(ROUTINES.length?ROUTINES[0].id:null); go("routines"); toast("Deleted"); }
function editAsRoutine(si,week){ createRoutine(si+":"+week); go("editor"); toast("Copied into My Routines — edit away"); }
function openRoutine(id){ setActive(id); go("editor"); }
function startNewRoutine(){ const sel=document.getElementById("baseSel"); createRoutine(sel?sel.value:"empty"); go("editor"); }

let toastTimer=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1700); }

/* ---- router ---- */
let route={view:"plan",week:null,si:0};
let seriesIdx=0;
let libState={mod:"all",area:"all",q:""};
const NAVITEMS=[["plan","Plan"],["library","Library"],["routines","My Routines"],["progress","Progress"],["training","Training"],["materials","Materials"]];
function go(view,week){ route={view,week:week||null,si:seriesIdx}; renderView(); window.scrollTo({top:0,behavior:"instant"}); }
function setSeries(i){ seriesIdx=i; route.si=i; renderView(); }

function renderNav(){
  const nav=document.getElementById("nav"); nav.innerHTML="";
  NAVITEMS.forEach(([v,label])=>{
    const b=document.createElement("button"); b.textContent=label;
    const on = route.view===v || (route.view==="class"&&v==="plan") || (route.view==="editor"&&v==="routines");
    if(on) b.className="on";
    b.onclick=()=>go(v); nav.appendChild(b);
  });
}

/* ---- views ---- */
function viewPlan(){
  const s=SERIES[seriesIdx];
  const tabs=SERIES.map((se,i)=>`<button class="seriestab ${i===seriesIdx?'on':''}" onclick="setSeries(${i})">${se.name}</button>`).join("");
  const legend=MIX_KEYS.map(k=>`<span><i style="background:var(--${k})"></i>${MOD[k].label}</span>`).join("");
  const cards=s.classes.map((c,idx)=>{
    const moves=hasMoves(c);
    const body = moves
      ? `<div class="mixbar">${mixBar(allMoves(c))}</div>`
      : `<div class="wk-overview">Overview · moves not added yet</div>`;
    const meta = moves
      ? `<span class="time">${fmtTime(classSec(c))} · ${classMoves(c)} moves</span>`
      : `<span class="time">${c.planned?c.planned.time:""} · ${c.planned?c.planned.sections+" sections":""}</span>`;
    return `<button class="weekcard rise" style="animation-delay:${idx*45}ms" onclick="go('class',${c.week})">
      <div class="wk-num">Week<b>${String(c.week).padStart(2,"0")}</b></div>
      <div class="wk-body"><h3>${c.theme}</h3><p>${c.intent}</p>${body}</div>
      <div class="wk-meta"><span class="chip">${c.difficulty}</span>${meta}<span class="arrow">→</span></div>
    </button>`;
  }).join("");
  return `<section class="masthead">
      <p class="eyebrow">${SERIES.length} series · choose your path</p>
      <div class="series-tabs">${tabs}</div>
      <h1>${s.hero||s.name}</h1>
      <p class="lede">${s.tagline}</p>
      <div class="legend">${legend}</div>
    </section>
    <div class="season">${cards}</div>`;
}

function viewClass(si,week){
  const s=SERIES[si]||SERIES[0];
  const c=s.classes.find(x=>x.week===week); if(!c) return viewPlan();
  const note=c.themeNote?`<div class="notebox">Note · ${c.themeNote}</div>`:"";
  const head = (metaHtml)=>`<button class="backbtn" onclick="go('plan')">← ${s.name}</button>
    <div class="detail-head"><p class="kicker">${s.name} · Week ${String(c.week).padStart(2,"0")} of 08</p><h2>${c.theme}</h2>
      <div class="meta">${metaHtml}</div>
      <p class="intent">${c.intent}</p>`;
  if(!hasMoves(c)){
    const targets=(c.targets||[]).map(t=>`<span class="chip soft">${t}</span>`).join("");
    const planned=c.planned?`<span class="time">${c.planned.time} planned</span><span class="count">${c.planned.sections} sections</span>`:"";
    return head(`<span class="chip">${c.difficulty}</span>${planned}`)
      + (targets?`<div class="targetrow">${targets}</div>`:"")
      + note
      + `<div class="class-empty"><b>Run sheet not added yet</b>Paste this class's sections — each with a name, target area, music pairing and its moves — and they'll build into a full run sheet here, exactly like the BarreFlow weeks.</div></div>`;
  }
  const sections=c.sections.map((sec,si2)=>{
    const moves=sec.moves.map(m=>{
      const newpill=m.new?`<span class="newpill mnew">New</span>`:"";
      return `<div class="move m-${m.m}">${newpill}<div class="mhead"><span class="mtag t-${m.m}">${tagOf(m.m)}</span><span class="mname">${m.n}</span></div><span class="mcount">${m.c}</span><p class="mcue">${m.q}</p></div>`;
    }).join("");
    const music=sec.music?`<div class="music"><span class="note">&#9834;</span><span class="song">${sec.music.song}</span>${sec.music.artist} <span class="mood">${sec.music.mood}</span></div>`:"";
    const newpill=sec.new?`<span class="newpill">New</span>`:"";
    return `<section class="section rise" style="animation-delay:${si2*40}ms"><div class="sec-rail"><div class="sec-time">${fmtTime(sectionSec(sec))}</div><div class="sec-tgt">${sec.target}</div>${music}</div><div class="sec-body"><h4>${sec.name}${newpill}</h4>${moves}</div></section>`;
  }).join("");
  return head(`<span class="chip">${c.difficulty}</span>${c.planned?`<span class="count">${c.planned.time} planned</span>`:""}<span class="time">${fmtTime(classSec(c))} working</span><span class="count">${classMoves(c)} moves · ${c.sections.length} sections</span>`)
    + `<button class="btn-ghost" onclick="editAsRoutine(${si},${c.week})">Edit as a routine →</button>${note}</div>${sections}`;
}

/* library */
function libChipsHTML(){
  const mod=[["all","All"]].concat(MIX_KEYS.map(k=>[k,MOD[k].label]));
  const modChips=mod.map(([k,l])=>`<button class="fchip ${libState.mod===k?'on':''}" ${k!=='all'?`data-mod="${k}"`:''} onclick="setLibMod('${k}')">${l}</button>`).join("");
  const areaChips=[["all","All areas"]].concat(AREAS.map(a=>[a,a])).map(([k,l])=>`<button class="fchip ${libState.area===k?'on':''}" onclick="setLibArea(this.getAttribute('data-a'))" data-a="${k}">${l}</button>`).join("");
  return `<div class="chiprow"><span class="label">Type</span>${modChips}</div><div class="chiprow"><span class="label">Area</span>${areaChips}</div>`;
}
function libResultsHTML(){
  const q=libState.q.toLowerCase();
  const list=LIBRARY.filter(e=>(libState.mod==="all"||e.m===libState.mod)&&(libState.area==="all"||e.targets.includes(libState.area))&&(!q||e.n.toLowerCase().includes(q)||e.q.toLowerCase().includes(q)));
  const count=`<div class="libcount">${list.length} move${list.length===1?"":"s"}${q?" matching \u201c"+libState.q+"\u201d":""}</div>`;
  if(!list.length) return count+`<p class="empty">No moves match. Try clearing the search or a different filter.</p>`;
  const cards=list.map(e=>{
    const i=LIBRARY.indexOf(e);
    const wk=e.weeks.length>=8?"all weeks":"weeks "+e.weeks.join(", ");
    const newpill=e.new?`<span class="newpill">New</span>`:"";
    return `<div class="libcard m-${e.m}"><div class="lhead"><span class="mtag t-${e.m}">${tagOf(e.m)}</span><span class="lname">${e.n}</span>${newpill}</div>
      <button class="addbtn" onclick="addLib(${i})">+ Add</button>
      <div class="lcue">${e.q}</div>
      <div class="lmeta">${e.c} · appears in ${wk}</div></div>`;
  }).join("");
  return count+cards;
}
function setLibMod(k){ libState.mod=k; refreshLib(); }
function setLibArea(k){ libState.area=k; refreshLib(); }
function refreshLib(){ const c=document.getElementById("libchips"); if(c) c.innerHTML=libChipsHTML(); const r=document.getElementById("libresults"); if(r) r.innerHTML=libResultsHTML(); }
function onLibSearch(v){ libState.q=v; const r=document.getElementById("libresults"); if(r) r.innerHTML=libResultsHTML(); }
function viewLibrary(){
  const r=getActive();
  const bar = r
    ? `<div class="addbar"><div><span class="ab-name">Adding to: ${r.name}</span><div class="ab-meta" id="addbarmeta">${r.items.length} moves · ${fmtTime(movesSec(r.items))}</div></div><div class="ab-actions"><button onclick="go('editor')">Open routine</button></div></div>`
    : `<div class="addbar"><div><span class="ab-name">No routine selected</span><div class="ab-meta">Adding a move will start a new routine</div></div><div class="ab-actions"><button onclick="go('routines')">My Routines</button></div></div>`;
  return `<div class="page-head"><h2>Move Library</h2><p>Every unique move across all series — ${LIBRARY.length} in all. Filter by type or body area, then add moves to the routine you're building.</p></div>
    ${bar}
    <div class="lib-controls">
      <input class="libsearch" id="libsearch" placeholder="Search moves…" value="${libState.q.replace(/"/g,'&quot;')}" oninput="onLibSearch(this.value)">
      <div id="libchips">${libChipsHTML()}</div>
    </div>
    <div id="libresults">${libResultsHTML()}</div>`;
}

/* routines */
function viewRoutines(){
  let opts=`<option value="empty">Empty routine</option>`;
  SERIES.forEach((s,si)=>{
    const wm=s.classes.filter(c=>hasMoves(c));
    if(wm.length) opts+=`<optgroup label="${s.name}">`+wm.map(c=>`<option value="${si}:${c.week}">Week ${c.week} — ${c.theme}</option>`).join("")+`</optgroup>`;
  });
  const picker=`<div class="newroutine"><select id="baseSel">${opts}</select><button class="btn" onclick="startNewRoutine()">Create routine</button></div>`;
  let list;
  if(!ROUTINES.length){
    list=`<p class="empty">No routines yet. Start one from a week above, or open any class and choose “Edit as a routine.”</p>`;
  }else{
    list=ROUTINES.map(r=>`<button class="rtcard" onclick="openRoutine('${r.id}')">
        <div><h3>${r.name}</h3><div class="rt-sub">${r.items.length} moves · ${fmtTime(movesSec(r.items))} · ${baseLabel(r.base)}</div><div class="mixbar">${mixBar(r.items)}</div></div>
        <div class="rt-go"><span class="arrow" style="font-size:20px;color:var(--barre)">→</span></div></button>`).join("");
  }
  return `<div class="page-head"><h2>My Routines</h2><p>Your saved, named routines. Build one from any week as a starting point or from scratch, add moves from the Library, then reorder and trim. Everything saves as you go.</p></div>
    ${picker}${list}`;
}

/* editor */
function viewEditor(){
  const r=getActive(); if(!r) return viewRoutines();
  const items=r.items.length ? r.items.map((m,i)=>`<div class="eitem m-${m.m}">
      <div class="ehead"><span class="mtag t-${m.m}">${tagOf(m.m)}</span><span class="ename">${m.n}</span></div>
      <div class="ectrls"><input class="ecount" value="${(m.c||'').replace(/"/g,'&quot;')}" onchange="setCount(${i},this.value)" aria-label="Count or duration">
        <button class="iconbtn" onclick="moveItem(${i},-1)" aria-label="Move up">↑</button>
        <button class="iconbtn" onclick="moveItem(${i},1)" aria-label="Move down">↓</button>
        <button class="iconbtn danger" onclick="removeItem(${i})" aria-label="Remove">✕</button></div>
      <p class="ecue">${m.q}</p></div>`).join("")
    : `<p class="empty">No moves yet. Use “Add moves from Library” below to start filling this routine.</p>`;
  return `<button class="backbtn" onclick="go('routines')">← My Routines</button>
    <div class="editor-head">
      <input class="rtname" value="${r.name.replace(/"/g,'&quot;')}" onchange="renameActive(this.value)" aria-label="Routine name">
      <div class="editor-meta"><span class="chip">${baseLabel(r.base)}</span><span class="time">${fmtTime(movesSec(r.items))}</span><span class="count">${r.items.length} moves</span><span class="autosave">Saved automatically</span></div>
      <div class="mixbar" style="max-width:340px">${mixBar(r.items)}</div>
      <div class="editor-actions"><button class="btn-ghost" onclick="duplicateActive()">Duplicate</button><button class="btn-ghost" onclick="deleteActive()">Delete</button></div>
    </div>
    <div class="addmoves"><button class="btn" onclick="go('library')">＋ Add moves from Library</button></div>
    ${items}`;
}

const STUBS={
  training:{icon:"&#9678;",title:"Teacher Training",msg:"Empty for now. Send the teacher-training content over and it'll live here."},
  materials:{icon:"&#9783;",title:"Training Materials",msg:"Nothing here yet. Paste your materials and downloads into the chat to add them."}
};
function viewStub(key){ const s=STUBS[key]; return `<div class="stub rise"><div class="icon">${s.icon}</div><h2>${s.title}</h2><p>${s.msg}</p></div>`; }

/* progress */
const BENCH=[
  {id:"fold",label:"Forward fold",hint:"Reach past toes, or distance to floor (in)",better:"up"},
  {id:"splitL",label:"Front split — left",hint:"Inches of front hip off the floor (lower is deeper)",better:"down"},
  {id:"splitR",label:"Front split — right",hint:"Inches off the floor",better:"down"},
  {id:"straddle",label:"Middle split / straddle",hint:"Inches of hips off the floor",better:"down"},
  {id:"shoulderOH",label:"Overhead reach",hint:"Arms to wall, gap at lower back (in)",better:"down"},
  {id:"shoulderBack",label:"Behind-back clasp",hint:"Gap between hands (in); 0 = hands meet",better:"down"},
  {id:"balanceL",label:"Balance hold — left",hint:"Seconds on one leg, eyes closed",better:"up"},
  {id:"balanceR",label:"Balance hold — right",hint:"Seconds",better:"up"},
  {id:"plank",label:"Plank hold",hint:"Seconds to failure",better:"up"}
];
function loadBench(){ try{ return JSON.parse(store.get("bf_bench")||"{}"); }catch(e){ return {}; } }
function viewProgress(){
  const data=loadBench();
  const rows=BENCH.map(b=>{
    const w1=data["w1_"+b.id]||"",w8=data["w8_"+b.id]||"";
    let delta=`<span class="delta flat">—</span>`;
    const a=parseFloat(w1),z=parseFloat(w8);
    if(!isNaN(a)&&!isNaN(z)){ const diff=+(z-a).toFixed(1); const improved=b.better==="up"?diff>0:diff<0; const cls=diff===0?"flat":(improved?"up":"down"); const sign=diff>0?"+":""; delta=`<span class="delta ${cls}">${sign}${diff}</span>`; }
    return `<tr><td class="metric">${b.label}<small>${b.hint}</small></td><td><input inputmode="decimal" data-k="w1_${b.id}" value="${w1}" placeholder="—"></td><td><input inputmode="decimal" data-k="w8_${b.id}" value="${w8}" placeholder="—"></td><td>${delta}</td></tr>`;
  }).join("");
  return `<div class="page-head"><h2>Progress check</h2><p>Log your numbers in Week 1, repeat them in Week 8, and watch the change. This is how you prove the flexibility work is doing what it should — not just feeling it, measuring it.</p></div>
    <table class="bench"><thead><tr><th>Measurement</th><th>Week 1</th><th>Week 8</th><th>Change</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="save-row"><button class="btn" onclick="saveBench()">Save numbers</button><span class="savedmsg" id="savedmsg" style="display:none">Saved.</span></div>
    <p class="storenote">Your numbers save on this device. In the in-chat preview they hold for the session; once you host the file on your own site, they persist between visits.</p>`;
}
function saveBench(){
  const data=loadBench();
  document.querySelectorAll(".bench input").forEach(i=>{ data[i.dataset.k]=i.value.trim(); });
  store.set("bf_bench",JSON.stringify(data));
  const m=document.getElementById("savedmsg"); m.style.display="inline"; setTimeout(()=>m.style.display="none",1800); renderView();
}

function renderView(){
  renderNav();
  const app=document.getElementById("app"); let html;
  switch(route.view){
    case "class": html=viewClass(route.si,route.week); break;
    case "library": html=viewLibrary(); break;
    case "routines": html=viewRoutines(); break;
    case "editor": html=viewEditor(); break;
    case "progress": html=viewProgress(); break;
    case "training": html=viewStub("training"); break;
    case "materials": html=viewStub("materials"); break;
    default: html=viewPlan();
  }
  app.innerHTML=html;
  const totalClasses=SERIES.reduce((a,s)=>a+s.classes.length,0);
  document.getElementById("footnote").textContent=SERIES.length+" series · "+totalClasses+" classes · "+LIBRARY.length+" moves · "+ROUTINES.length+" routine"+(ROUTINES.length===1?"":"s");
}
window.go=go; window.setSeries=setSeries; window.addLib=addLib; window.removeItem=removeItem; window.moveItem=moveItem; window.setCount=setCount;
window.renameActive=renameActive; window.duplicateActive=duplicateActive; window.deleteActive=deleteActive;
window.editAsRoutine=editAsRoutine; window.openRoutine=openRoutine; window.startNewRoutine=startNewRoutine;
window.setLibMod=setLibMod; window.setLibArea=setLibArea; window.onLibSearch=onLibSearch; window.saveBench=saveBench;
renderView();
</script>
</body>
